# ── Protocolos ──────────────────────────────────────────────
rtmpAddress: :1935          # OBS apunta a 100.x.x.x:1935 (Tailscale)
hlsAddress: :8888           # Nginx proxea este puerto
apiAddress: :9997           # Solo accesible internamente (127.0.0.1)
api: yes

# ── HLS low-latency ─────────────────────────────────────────
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsAlwaysRemux: yes

# ── Auth ────────────────────────────────────────────────────
# Sin autenticación a nivel de app: el puerto RTMP (1935) solo es
# accesible por Tailscale (firewall: zona tailscale), así que la red ya
# limita quién puede publicar. La lectura HLS es pública a propósito
# (espectadores vía Cloudflare). Se usan los usuarios por defecto de
# mediamtx, que además permiten el acceso a la API desde localhost
# (lo necesita el backend). NO definir authInternalUsers aquí: hacerlo
# rompía el acceso anónimo de lectura (cookieCheck) y la API.

paths:
  # ── Canal WEB: la escena CON anime ──────────────────────────
  # Solo se sirve como HLS al reproductor de la web y se graba.
  # NO se reenvía a Twitch.
  web:
    record: yes
    recordPath: /recordings/%path/%Y-%m-%dT%H-%M-%S.mp4
    recordSegmentDuration: 1h

  # ── Canal TWITCH: la escena SIN anime ───────────────────────
  # Se reenvía a Twitch vía FFmpeg. Esto es lo que ven en Twitch.
  twitch:
    runOnReady: >-
      ffmpeg
      -i rtmp://127.0.0.1:1935/twitch
      -c:v copy
      -c:a aac -b:a 160k -ar 44100
      -f flv rtmp://live.twitch.tv/app/${TWITCH_STREAM_KEY}
    runOnReadyRestart: yes
