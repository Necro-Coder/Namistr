# ── Un solo dominio con rutas ────────────────────────────────
# server_name _ = default server: responde a cualquier Host (necrocoder.site
# llega vía Cloudflare Tunnel). Así no hace falta hornear el dominio aquí.
server {
    listen 80 default_server;
    server_name _;

    # DNS interno de Docker, para resolver nombres de servicio en runtime.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── API backend (network_mode: host → puerto 3001 del host) ──
    # SIN barra final en proxy_pass: conserva el prefijo /api/,
    # que es como están definidas las rutas del backend.
    location /api/ {
        proxy_pass http://host.docker.internal:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── OAuth de Twitch (login + callback) ──────────────────────
    location /auth/ {
        proxy_pass http://host.docker.internal:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check (usado por el smoke test del CI/CD) ────────
    location = /health {
        proxy_pass http://host.docker.internal:3001/health;
    }

    # ── HLS (MediaMTX, network_mode: host → puerto 8888) ────────
    # CON barra final: quita el prefijo /hls/, así MediaMTX recibe
    # /stream/index.m3u8 (la ruta "stream" del mediamtx.yml).
    location /hls/ {
        proxy_pass http://host.docker.internal:8888/;
        proxy_set_header Host $host;

        # MediaMTX hace un redirect "cookieCheck" relativo a /web/...
        # Le añadimos el prefijo /hls/ y, con absolute_redirect off,
        # evitamos que nginx lo convierta en http://host/... (mixed
        # content). Así queda relativo y el navegador hereda el https.
        absolute_redirect off;
        proxy_redirect ~^https?://[^/]+/(.*)$ /hls/$1;
        proxy_redirect ~^/(.*)$ /hls/$1;
        proxy_set_header X-Forwarded-Proto https;

        # Headers críticos para HLS en vivo
        add_header Cache-Control "no-cache, no-store";
        add_header Access-Control-Allow-Origin "*";
        proxy_cache off;
    }

    # ── Frontend (todo lo demás) ────────────────────────────────
    # Variable en proxy_pass → nginx resuelve "frontend" en cada petición
    # vía el resolver. Sin esto, al recrear el contenedor frontend (deploy)
    # nginx se queda con la IP vieja y devuelve 502.
    location / {
        set $frontend_upstream frontend:7000;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
