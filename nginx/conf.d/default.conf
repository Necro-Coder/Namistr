# ── Web App principal ────────────────────────────────────────
server {
    listen 80;
    server_name stream.tudominio.com;

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # backend corre con network_mode: host → escucha en el host:3001.
    # host.docker.internal resuelve a la IP del host desde el contenedor nginx.
    location /api/ {
        proxy_pass http://host.docker.internal:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ── HLS endpoint (MediaMTX) ──────────────────────────────────
server {
    listen 80;
    server_name hls.tudominio.com;

    location / {
        # MediaMTX corre con network_mode: host → puerto 8888 del host
        proxy_pass http://host.docker.internal:8888;
        proxy_set_header Host $host;

        # Headers críticos para HLS en vivo
        add_header Cache-Control "no-cache, no-store";
        add_header Access-Control-Allow-Origin "*";
        proxy_cache off;
    }
}

# ── API endpoint ─────────────────────────────────────────────
server {
    listen 80;
    server_name api.tudominio.com;

    location / {
        proxy_pass http://host.docker.internal:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
