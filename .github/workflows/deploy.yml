name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:        # deploy manual desde GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ── Build de imágenes en runners gratuitos de GitHub ───────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [frontend, backend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      # GHCR exige el nombre del repo en minúsculas (Necro-Coder/Namistr → necro-coder/namistr)
      - name: Repo en minúsculas
        run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_REPO }}/${{ matrix.service }}:latest
            ghcr.io/${{ env.IMAGE_REPO }}/${{ matrix.service }}:${{ github.sha }}
          # build-args leídos de las Variables de GitHub
          # (Repo → Settings → Secrets and variables → Actions → Variables).
          # El backend los ignora; solo afectan al build del frontend.
          build-args: |
            VITE_HLS_URL=https://${{ vars.DOMAIN }}/hls/web/index.m3u8
            VITE_API_URL=https://${{ vars.DOMAIN }}
            VITE_TWITCH_CHANNEL=${{ vars.TWITCH_CHANNEL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy en tu VPS via el runner de Tailscale ────────────
  deploy:
    needs: build
    runs-on: [self-hosted, vps]   # el runner que corre en el VPS

    steps:
      # Sincroniza el directorio de despliegue del VPS con master.
      # (el .env y recordings están gitignored, no se tocan)
      - name: Sync repo en el VPS
        run: |
          cd /srv/homelab/custom_apps/Namistr
          git fetch origin master
          git reset --hard origin/master

      - name: Update IMAGE_TAG in .env
        run: |
          cd /srv/homelab/custom_apps/Namistr
          sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ github.sha }}/" .env

      - name: Pull & redeploy (stack completo)
        run: |
          cd /srv/homelab/custom_apps/Namistr
          # imágenes frescas de la app
          docker compose pull frontend backend
          # levanta TODO el stack: recrea front/back (cambió IMAGE_TAG) y
          # arranca nginx/mediamtx/cloudflared si no están corriendo.
          docker compose up -d --remove-orphans
          # nginx NO se recrea (su imagen/def no cambian), pero su config
          # montada sí pudo cambiar con el git reset → recargar para tomarla.
          docker compose exec -T nginx nginx -s reload \
            || docker compose up -d --force-recreate nginx
          docker image prune -f

      - name: Smoke test
        run: |
          cd /srv/homelab/custom_apps/Namistr
          sleep 8
          curl -sf https://${{ vars.DOMAIN }}/health \
            || (docker compose logs --tail=50 backend && exit 1)
