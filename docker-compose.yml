services:

  # ─── Media Server ─────────────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: mediamtx
    restart: unless-stopped
    network_mode: host
    # host es necesario para que OBS llegue por la IP de Tailscale
    # y para que ffmpeg reenvíe a Twitch sin restricciones de red
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    env_file: .env

  # ─── Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"   # solo localhost, CF Tunnel apunta aquí
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    extra_hosts:
      # permite que nginx (bridge) alcance backend/mediamtx (network_mode: host)
      - "host.docker.internal:host-gateway"
    depends_on:
      - frontend
      - backend

  # ─── Frontend Vue.js ──────────────────────────────────────
  frontend:
    image: ghcr.io/${GHCR_REPO}/frontend:${IMAGE_TAG:-latest}
    container_name: frontend
    restart: unless-stopped
    # Las VITE_* NO van aquí: son variables de build, ya horneadas en la
    # imagen por el workflow (build-args desde las Variables de GitHub).

  # ─── Backend Node.js ──────────────────────────────────────
  backend:
    image: ghcr.io/${GHCR_REPO}/backend:${IMAGE_TAG:-latest}
    container_name: backend
    restart: unless-stopped
    environment:
      - MEDIAMTX_API_URL=http://127.0.0.1:9997
      - PORT=3001
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
    network_mode: host

  # ─── Cloudflare Tunnel ────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      - nginx

  # El runner de GitHub Actions está instalado directamente en el VPS
  # (/opt/namistr-runner), no como contenedor. Por eso aquí no hay
  # servicio github-runner: evitamos un runner duplicado.
